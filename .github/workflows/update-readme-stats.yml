name: Update README stats

on:
  schedule:
    # Every day at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch stats from D1 and update README
        env:
          CF_TOKEN:       ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID:  "7c6295a096ddf6e771e09fd5d28104c7"
          CF_DATABASE_ID: "564f85d5-de1a-48c0-886c-dfc9de712880"
        run: |
          python3 - <<'PYEOF'
          import json, os, re, urllib.request, urllib.error, sys
          from datetime import datetime, timezone

          token       = os.environ["CF_TOKEN"]
          account_id  = os.environ["CF_ACCOUNT_ID"]
          database_id = os.environ["CF_DATABASE_ID"]
          BASE        = f"https://api.cloudflare.com/client/v4/accounts/{account_id}/d1/database/{database_id}/query"

          def d1_query(sql: str) -> list[dict]:
              body = json.dumps({"sql": sql, "params": []}).encode()
              req  = urllib.request.Request(BASE, data=body, method="POST", headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type":  "application/json",
              })
              try:
                  with urllib.request.urlopen(req, timeout=15) as r:
                      resp = json.loads(r.read())
              except urllib.error.HTTPError as e:
                  print(f"::error::D1 query failed: {e} — {e.read().decode()}")
                  sys.exit(1)
              if not resp.get("success"):
                  print(f"::error::D1 error: {resp.get('errors')}")
                  sys.exit(1)
              return resp["result"][0]["results"]

          distros   = d1_query("SELECT distro AS label, COUNT(*) AS nb FROM users GROUP BY distro ORDER BY nb DESC LIMIT 30")
          headsets  = d1_query("SELECT headset AS label, product_id, COUNT(*) AS nb FROM users GROUP BY headset, product_id ORDER BY nb DESC LIMIT 30")
          total_row = d1_query("SELECT COUNT(*) AS nb FROM users")

          total   = total_row[0]["nb"] if total_row else 0
          updated = datetime.now(timezone.utc).strftime("%Y-%m-%d")
          print(f"Fetched: {total} unique users")

          distros_md = "| Distribution | Installs |\n|---|---|\n"
          for row in distros[:15]:
              distros_md += f"| {row['label']} | {row['nb']} |\n"

          def detect_method(name: str) -> str:
              n = name.lower()
              if any(k in n for k in ("arch","cachyos","manjaro","endeavour","garuda","artix")): return "🎯 AUR"
              if "fedora" in n or "nobara" in n: return "🎯 COPR"
              if any(k in n for k in ("ubuntu","debian","mint","pop!_os","elementary","zorin","kubuntu","xubuntu")): return "🎯 PPA"
              return "📦 Source"

          if distros:
              tested_distros_md = "| Distribution | Install method | Users |\n|---|---|---|\n"
              for row in distros:
                  tested_distros_md += f"| {row['label']} | {detect_method(row['label'])} | 👥 {row['nb']} |\n"
          else:
              tested_distros_md = "_No data yet — stats will appear after the first users opt in._\n"

          headset_totals: dict[str, int] = {}
          for row in headsets:
              headset_totals[row["label"]] = headset_totals.get(row["label"], 0) + int(row.get("nb", 0))

          headsets_md = "| Headset | Installs |\n|---|---|\n"
          for name, nb in sorted(headset_totals.items(), key=lambda x: -x[1])[:20]:
              headsets_md += f"| {name} | {nb} |\n"

          DEVICES = [
              ("Arctis 1 / 7X / 7P Wireless",               "⚠️","⚠️","12b3, 12b6, 12d5, 12d7",           ["Arctis 1/7X/7P Wireless"]),
              ("Arctis 7 / 7 2019 / Pro 2019 / Pro GameDAC","⚠️","⚠️","1260, 12ad, 1252, 1280",            ["Arctis 7/Pro Gaming"]),
              ("Arctis 7+ / PS5 / Xbox / Destiny",           "⚠️","⚠️","220e, 2212, 2216, 2236",            ["Arctis 7+"]),
              ("Arctis 9 Wireless",                          "⚠️","⚠️","12c2",                              ["Arctis 9 Wireless"]),
              ("Arctis Pro Wireless",                        "⚠️","⚠️","1290, 1294",                        ["Arctis Pro Wireless"]),
              ("Arctis Nova Pro Wireless / X",               "✅","✅","12e0, 12e5",                        ["Arctis Nova Pro Wireless"]),
              ("Arctis Nova Pro Wired / Xbox Wired",         "✅","✅","12cb, 12cd",                        ["Arctis Nova Pro Wired"]),
              ("Arctis Nova 3",                              "⚠️","⚠️","12ec",                              ["Arctis Nova 3"]),
              ("Arctis Nova 3P / 3X Wireless",               "⚠️","⚠️","2269, 226d",                        ["Arctis Nova 3P Wireless","Arctis Nova 3X Wireless"]),
              ("Arctis Nova 5 / 5X",                        "⚠️","⚠️","2232, 2253",                        ["Arctis Nova 5 Wireless"]),
              ("Arctis Nova 7 Gen 1",                       "⚠️","⚠️","2202, 2206, 223a, 227a, 22a4",      ["Arctis Nova 7 (Gen 1)"]),
              ("Arctis Nova 7 Gen 2",                       "⚠️","⚠️","22a1, 227e, 2258, 229e, 22a9, 22a5",["Arctis Nova 7 (Gen 2)"]),
              ("Arctis Nova 7P",                            "⚠️","⚠️","220a, 22a7",                        ["Arctis Nova 7P (Gen 1)","Arctis Nova 7P (Gen 2)"]),
          ]

          seen_pids: set[str] = set()
          for row in headsets:
              pid = str(row.get("product_id") or "").lower().replace("0x","").strip()
              if pid and pid != "unknown":
                  seen_pids.add(pid)

          def format_pids(s: str) -> str:
              parts = []
              for p in s.split(", "):
                  p = p.strip()
                  if p.lower() in seen_pids:
                      parts.append("$\\color{cyan}{\\textbf{" + p + "}}$")
                  else:
                      parts.append(p)
              return ", ".join(parts)

          devices_md = "| Device | Mixer | Advanced features | Users | Product ID(s) |\n|---|---|---|---|---|\n"
          for display, mixer, advanced, pids, keys in DEVICES:
              count      = sum(headset_totals.get(k,0) for k in keys)
              users_cell = f"👥 {count}" if count else ""
              if mixer == "⚠️" and count >= 1:
                  mixer, advanced, display = "✅","✅",f"**{display}**"
              devices_md += f"| {display} | {mixer} | {advanced} | {users_cell} | {format_pids(pids)} |\n"

          readme = open("README.md", encoding="utf-8").read()

          def replace_section(content, marker, replacement):
              return re.sub(
                  rf"(<!-- STATS:{marker}:START -->).*?(<!-- STATS:{marker}:END -->)",
                  lambda m: m.group(1) + "\n" + replacement + "\n" + m.group(2),
                  content, flags=re.DOTALL)

          readme = replace_section(readme, "DEVICES",        devices_md)
          readme = replace_section(readme, "TESTED_DISTROS", tested_distros_md)
          readme = replace_section(readme, "DISTROS",        distros_md)
          readme = replace_section(readme, "HEADSETS",       headsets_md)
          readme = replace_section(readme, "META",
              f"_Based on **{total}** anonymous data points — last updated {updated}_\n")

          open("README.md", "w", encoding="utf-8").write(readme)
          print("README.md updated.")
          PYEOF

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (
            git add README.md &&
            git commit -m "chore: update anonymous usage stats [skip ci]" &&
            git push origin HEAD
          )
