name: Wheel install test (Linux)

on:
  push:
    # Branches only — never run on tag pushes. Releases are tagged on the same
    # commit already tested on its branch, and release.yaml owns the tag event,
    # so a tag-triggered run here is redundant (and used to show red on the
    # transient packaging drift at release time).
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

jobs:
  test-linux:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    strategy:
      fail-fast: false
      matrix:
        distro:
          - fedora:42
          - fedora:43
          - ubuntu:24.04
          - ubuntu:25.10
          - debian:trixie-slim
          - debian:bookworm-slim
          - archlinux:latest
          - cachyos/cachyos:latest


    container:
      image: ${{ matrix.distro }}

    steps:
      # The matrix images are bare distros with no git. actions/checkout needs
      # git to produce a real .git checkout; without it, it silently falls back
      # to a tarball download (no .git), and the later `git log` in the drift
      # check fails with "not a git repository". So install git *before* checkout.
      - name: Install git (required by actions/checkout)
        run: |
          set -e
          if command -v apt-get >/dev/null; then
            DEBIAN_FRONTEND="noninteractive" apt-get update
            DEBIAN_FRONTEND="noninteractive" apt-get install -y git
          elif command -v dnf >/dev/null; then
            dnf install -y git
          elif command -v pacman >/dev/null; then
            pacman -Sy --noconfirm git
          fi

      - uses: actions/checkout@v4

      # actions/checkout only whitelists the repo as a git safe.directory inside
      # its own step's temporary config. Later steps run git as a different
      # uid/HOME and hit "detected dubious ownership", so mark it safe globally
      # for every subsequent step (the packaging-drift check runs `git log`).
      - name: Mark workspace as a safe git directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install system dependencies
        run: |
          set -e
          if command -v apt-get >/dev/null; then
            DEBIAN_FRONTEND="noninteractive" apt-get update
            DEBIAN_FRONTEND="noninteractive" apt-get install -y python3 python3-pip python3-venv pipx curl git \
              libpulse0 libusb-1.0-0 libudev1
          elif command -v dnf >/dev/null; then
            dnf install -y python3 python3-pip pipx git pulseaudio-libs libusb1 systemd-libs
          elif command -v pacman >/dev/null; then
            pacman -Sy --noconfirm python python-pip python-pipx git libpulse libusb
          else
            echo "Unsupported package manager"
            exit 1
          fi

          curl -LsSf https://astral.sh/uv/install.sh | sh

          # The job runs inside a distro container as root, but the checked-out
          # files are owned by the runner uid. Without this, git refuses with
          # "fatal: detected dubious ownership ... (exit 128)" in the drift-check
          # steps below (which call `git log` / git from check-packaging-drift.py).
          git config --global --add safe.directory '*'

      - name: Ensure PATHs
        run: |
          pipx ensurepath
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build wheel
        run: |
          python --version | awk '{split($2,v,"."); print v[1]"."v[2]}' > .python-version
          uv build

      - name: Run pytest (mock-based, no hardware needed)
        run: |
          uv sync --all-extras --dev
          # tests/test_device_detection.py covers all 13 device families and ~40 PIDs
          # via mocked usb.core / pyudev — must pass on every distro to guarantee
          # detection logic stays portable.
          uv run pytest tests/test_device_detection.py -v

      - name: Verify shared udev generator works headless
        run: |
          # Exercise both entry points to catch import-path regressions:
          uv run python3 scripts/generate_udev_rules.py | grep "uaccess" | wc -l
          uv run python3 -c "from arctis_sound_manager.udev_rules import generate_rules; from pathlib import Path; print(generate_rules([Path('src/arctis_sound_manager/devices')])[:200])"

      - name: Packaging drift check (versions, generated files, deps)
        run: |
          # Skip on release / version-bump commits: the sync-packaging-version
          # workflow updates PKGBUILD/.SRCINFO/.spec/debian/changelog/metainfo in
          # follow-up [skip ci] commits that run in parallel, so at the release
          # commit (and its tag) the packaging files still lag pyproject.toml —
          # the drift is expected and transient. Match every commit subject that
          # bumps the version: `release: vX`, `Merge develop for vX`, and the
          # legacy `chore: bump version`.
          MSG=$(git log -1 --pretty=%s)
          if echo "$MSG" | grep -qE "^(chore(\([^)]*\))?: bump version|release: v[0-9]|Merge develop for v[0-9])"; then
            echo "Release/version-bump commit — skipping packaging drift check (sync job will fix it)."
            exit 0
          fi
          # Fails the matrix run if pyproject.toml, PKGBUILD, .SRCINFO, the
          # spec, debian/changelog, the AppStream metainfo, or any cross-distro
          # dependency list is out of sync with the source of truth. See
          # scripts/check-packaging-drift.py for the rules.
          uv run python3 scripts/check-packaging-drift.py

      - name: Runtime deps drift check (system_deps_checker registry)
        run: |
          # Fails the matrix run if a new third-party `import X` or external
          # `subprocess.run(["foo", …])` was added to src/ without a matching
          # entry in system_deps_checker._build_checks(). The runtime
          # self-healing dialog (Phase 4 of ASM_PLAN_DEPS_CHECK) only fixes
          # deps it knows about — silent additions are exactly the trap that
          # made issue #23 silently break Spatial Audio on Fedora.
          python3 scripts/check-deps-drift.py

      - name: Install test (pipx, pip)
        run: |
          chmod +x tests/install-wheel-test.sh
          ./tests/install-wheel-test.sh
