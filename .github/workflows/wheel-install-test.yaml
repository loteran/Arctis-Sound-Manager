name: Wheel install test (Linux)

on:
  push:
  pull_request:

jobs:
  test-linux:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        distro:
          - fedora:42
          - fedora:43
          - ubuntu:24.04
          - ubuntu:25.10
          - debian:trixie-slim
          - debian:bookworm-slim
          - archlinux:latest
          - cachyos/cachyos:latest


    container:
      image: ${{ matrix.distro }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          set -e
          if command -v apt-get >/dev/null; then
            DEBIAN_FRONTEND="noninteractive" apt-get update
            DEBIAN_FRONTEND="noninteractive" apt-get install -y python3 python3-pip python3-venv pipx curl \
              libpulse0 libusb-1.0-0 libudev1
          elif command -v dnf >/dev/null; then
            dnf install -y python3 python3-pip pipx pulseaudio-libs libusb1 systemd-libs
          elif command -v pacman >/dev/null; then
            pacman -Sy --noconfirm python python-pip python-pipx libpulse libusb
          else
            echo "Unsupported package manager"
            exit 1
          fi

          curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Ensure PATHs
        run: |
          pipx ensurepath
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build wheel
        run: |
          python --version | awk '{split($2,v,"."); print v[1]"."v[2]}' > .python-version
          uv build

      - name: Run pytest (mock-based, no hardware needed)
        run: |
          uv sync --all-extras --dev
          # tests/test_device_detection.py covers all 13 device families and ~40 PIDs
          # via mocked usb.core / pyudev — must pass on every distro to guarantee
          # detection logic stays portable.
          uv run pytest tests/test_device_detection.py -v

      - name: Verify shared udev generator works headless
        run: |
          # Exercise both entry points to catch import-path regressions:
          uv run python3 scripts/generate_udev_rules.py | grep "uaccess" | wc -l
          uv run python3 -c "from arctis_sound_manager.udev_rules import generate_rules; from pathlib import Path; print(generate_rules([Path('src/arctis_sound_manager/devices')])[:200])"

      - name: Packaging drift check (versions, generated files, deps)
        run: |
          # Fails the matrix run if pyproject.toml, PKGBUILD, .SRCINFO, the
          # spec, debian/changelog, the AppStream metainfo, or any cross-distro
          # dependency list is out of sync with the source of truth. See
          # scripts/check-packaging-drift.py for the rules.
          uv run python3 scripts/check-packaging-drift.py

      - name: Install test (pipx, pip)
        run: |
          chmod +x tests/install-wheel-test.sh
          ./tests/install-wheel-test.sh
