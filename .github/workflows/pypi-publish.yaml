name: Publish to PyPI

# Single source of PyPI publishing. Two entry points, one job identity:
#   - workflow_call: invoked by release.yaml on tag push (normal auto-publish).
#   - workflow_dispatch: manual (re)publish of a past release, or after a
#     transient PyPI outage.
# Because release.yaml calls this as a *reusable* workflow, the OIDC
# job_workflow_ref claim always points at pypi-publish.yaml, so a single
# PyPI Trusted Publisher (workflow = pypi-publish.yaml) covers both paths.

on:
  workflow_call:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v1.0.75)'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v1.0.75)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC for Trusted Publisher
      contents: read
    steps:
      - name: Validate tag exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${{ inputs.tag }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "::error::Release ${{ inputs.tag }} not found"
            exit 1
          fi

      - name: Download wheel + sdist from the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          # Pull only the canonical Python distribution files. The hyphen-named
          # AUR tarball is intentionally excluded (twine would reject it).
          gh release download "${{ inputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern 'arctis_sound_manager-*-py3-none-any.whl' \
            --pattern 'arctis_sound_manager-*.tar.gz' \
            --dir dist/
          ls -l dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
          # Disabled: when release.yaml calls this as a reusable workflow, the
          # PEP 740 attestation certificate records the *caller* (release.yaml)
          # as its Build Config URI, which PyPI rejects against the Trusted
          # Publisher (pypi-publish.yaml). OIDC auth still matches correctly.
          attestations: false
