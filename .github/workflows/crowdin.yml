name: Crowdin Sync

on:
  push:
    branches: [main]
    paths:
      - "src/arctis_sound_manager/lang/en.ini"
  schedule:
    - cron: "0 * * * *"   # hourly, on the hour
  workflow_dispatch:

jobs:
  crowdin:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # push the localization branch + merge to main
      pull-requests: write    # create and merge the Crowdin PR
    steps:
      - uses: actions/checkout@v4

      - name: Crowdin upload sources & download translations
        uses: crowdin/github-action@v2
        with:
          upload_sources: true
          upload_translations: false
          download_translations: true
          # Ship every translated string, not only Crowdin-approved ones: this
          # project relies on community translations that are rarely formally
          # approved, so approved-only would strip most languages down to a
          # handful of strings. Auto-merge (below) therefore ships whatever is
          # translated on Crowdin — quality is managed on Crowdin itself.
          export_only_approved: false
          skip_untranslated_strings: true
          # Download into the working tree only; sanitize before opening the PR.
          push_translations: false
          create_pull_request: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}

      - name: Sanitize downloaded translations
        # Fold stray translator line breaks back onto their value so a single
        # bad newline can't make a whole language file unparseable (and thus
        # silently vanish from the language menu). Shares the exact logic the
        # runtime loader uses. See src/arctis_sound_manager/lang_sanitize.py.
        run: python3 -m arctis_sound_manager.lang_sanitize src/arctis_sound_manager/lang
        env:
          PYTHONPATH: src

      - name: Create translations pull request
        uses: peter-evans/create-pull-request@v6
        with:
          base: main
          branch: i18n/crowdin-translations
          title: "i18n: new Crowdin translations"
          body: |
            Automatic translation update from Crowdin.
            Strings translated below the 80 % threshold are skipped.
            Downloaded files are sanitized to repair stray line breaks.
          commit-message: "i18n: update translations from Crowdin [skip ci]"
          delete-branch: true

      - name: Auto-merge the Crowdin PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # A PR only exists when there were translation changes to commit;
          # when there are none, there is nothing to merge.
          PR=$(gh pr list --repo "$GITHUB_REPOSITORY" \
                 --head i18n/crowdin-translations --base main \
                 --state open --json number --jq '.[0].number // empty')
          if [ -z "$PR" ]; then
            echo "No open Crowdin PR — nothing to merge."
            exit 0
          fi
          echo "Merging Crowdin PR #$PR into main..."
          # GitHub may still be computing mergeability right after the PR is
          # (re)created — retry a few times before giving up (the PR persists,
          # so the next hourly run would merge it anyway).
          for attempt in 1 2 3 4 5; do
            if gh pr merge "$PR" --repo "$GITHUB_REPOSITORY" --merge; then
              echo "Merged PR #$PR."
              exit 0
            fi
            echo "Merge attempt $attempt failed (mergeability not ready?) — retrying in 15s"
            sleep 15
          done
          echo "Could not merge PR #$PR this run; it will be retried next hour."
          exit 0
