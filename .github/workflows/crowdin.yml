name: Crowdin Sync

on:
  push:
    branches: [develop]
    paths:
      - "src/arctis_sound_manager/lang/en.ini"
  schedule:
    - cron: "0 6 * * *"   # every day 06:00 UTC
  workflow_dispatch:

jobs:
  crowdin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Crowdin upload sources & download translations
        uses: crowdin/github-action@v2
        with:
          upload_sources: true
          upload_translations: false
          download_translations: true
          export_only_approved: false
          skip_untranslated_strings: true
          push_translations: true
          create_pull_request: true
          pull_request_title: "i18n: new Crowdin translations"
          pull_request_body: |
            Automatic translation update from Crowdin.
            Strings translated below the 80 % threshold are skipped.
          pull_request_base_branch_name: develop
          localization_branch_name: i18n/crowdin-translations
          commit_message: "i18n: update translations from Crowdin [skip ci]"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
