# Pre-create Arctis_Game, Arctis_Chat and Arctis_Media virtual sinks natively via PipeWire.
#
# Without this, arctis-sound-manager creates them by loading PulseAudio
# modules (module-null-sink + module-loopback) via pipewire-pulse, which
# triggers a use-after-free bug in WirePlumber 0.5.x Lua scripting and
# crashes the session.
#
# ASM's create_virtual_sink() checks if the sink already exists (by node.name)
# and returns early if it does — so pre-creating them here prevents any
# PulseAudio module loading entirely.
#
# libpipewire-module-loopback with capture media.class=Audio/Sink is the
# native PipeWire equivalent of PulseAudio's module-null-sink + module-loopback.

context.modules = [
  # Virtual sink: Game channel → physical Arctis device
  {
    name  = libpipewire-module-loopback
    flags = [ nofail ]
    args  = {
      node.description = "Arctis Game"
      capture.props    = {
        node.name      = "Arctis_Game"
        media.class    = Audio/Sink
        audio.channels = 2
        audio.position = [ FL FR ]
      }
      playback.props   = {
        node.name          = "Arctis_Game_sink_out"
        audio.channels     = 2
        audio.position     = [ FL FR ]
        stream.dont-remix  = true
        node.target        = "alsa_output.usb-SteelSeries_Arctis_Nova_Pro_Wireless-00.analog-stereo"
        node.dont-fallback = true
        node.linger        = true
        latency.msec       = 50
      }
    }
  }
  # Virtual sink: Chat channel → physical Arctis device
  {
    name  = libpipewire-module-loopback
    flags = [ nofail ]
    args  = {
      node.description = "Arctis Chat"
      capture.props    = {
        node.name      = "Arctis_Chat"
        media.class    = Audio/Sink
        audio.channels = 2
        audio.position = [ FL FR ]
      }
      playback.props   = {
        node.name          = "Arctis_Chat_sink_out"
        audio.channels     = 2
        audio.position     = [ FL FR ]
        stream.dont-remix  = true
        node.target        = "alsa_output.usb-SteelSeries_Arctis_Nova_Pro_Wireless-00.analog-stereo"
        node.dont-fallback = true
        node.linger        = true
        latency.msec       = 50
      }
    }
  }
  # Virtual sink: Media channel (browsers & video players) → physical Arctis device
  {
    name  = libpipewire-module-loopback
    flags = [ nofail ]
    args  = {
      node.description = "Arctis Media"
      capture.props    = {
        node.name      = "Arctis_Media"
        media.class    = Audio/Sink
        audio.channels = 2
        audio.position = [ FL FR ]
      }
      playback.props   = {
        node.name          = "Arctis_Media_sink_out"
        audio.channels     = 2
        audio.position     = [ FL FR ]
        stream.dont-remix  = true
        node.target        = "alsa_output.usb-SteelSeries_Arctis_Nova_Pro_Wireless-00.analog-stereo"
        node.dont-fallback = true
        node.linger        = true
        latency.msec       = 50
      }
    }
  }
]
