; first_run_dialog
first_run_welcome=Arctis Sound Manager’a hoş geldiniz
first_run_desc=PipeWire sanal çıkışlarını yapılandırmak, cihaz erişim kurallarını yüklemek, sanal surround darbe yanıtı dosyasını indirmek ve systemd servislerini etkinleştirmek için tek seferlik bir kurulum gereklidir. udev kurallarını yüklemek için sizden yönetici parolası istenecektir.
run_setup=Kurulumu çalıştır
; udev_dialog
udev_write_title=USB cihaz izinleri yapılandırılmamış
udev_write_body=Arctis kulaklığınıza root yetkisi olmadan erişmek için gerekli udev kuralları eksik veya hatalı. Bu kurallar olmadan, arka plan servisi USB cihazını açamaz (Hata 13: Erişim reddedildi). Bunu otomatik olarak düzeltmek için “Kuralları yükle” seçeneğine tıklayın (yönetici parolası gerekir).
udev_write_btn=Kuralları yükle
udev_reload_title=USB cihaz izinleri uygulanmadı
udev_reload_body=Udev kuralları yüklü, ancak şu anda bağlı olan Arctis cihazı, bu kurallar aktif olmadan önce takılmış. Bu nedenle arka plan servisi USB cihazını açamıyor (Hata 13: Erişim reddedildi). Mevcut cihaz için kuralları yeniden yüklemek ve uygulamak için “Şimdi uygula” seçeneğine tıklayın (yönetici parolası gerekir).
Alternatif olarak, USB adaptörünü çıkarıp tekrar takabilirsiniz.
udev_reload_btn=Şimdi uygula
; system_deps_dialog
sysdeps_header=Gerekli bazı bileşenler eksik
sysdeps_sub=Eksik sistem paketlerine bağlı ASM özellikleri, bu paketler yüklenene kadar çalışmayacaktır. Algılanan dağıtım {distro} — aşağıdaki kurulum komutları bu paket yöneticisine göre uyarlanmıştır. Her kurulumda (polkit aracılığıyla) yönetici parolası istenecektir.
dep_breaks=Bozar: {feature}
dep_note=Not: {note}
skip_until_upgrade=ASM güncellenene kadar tekrar gösterme
all_checks_pass=Tüm engelleyici ve düşürülmüş kontroller artık geçti — bu iletişim kutusunu kapatabilirsiniz.
; {count} = number of issues. Both forms must be translated on Crowdin.
issue_count_one={count} sorun tespit edildi. Tek bir polkit istemi için “Eksik olanların tümünü yükle” seçeneğini kullanın veya öğeleri ayrı ayrı düzeltin.
issue_count_other={count} sorun tespit edildi. Tek bir polkit istemi için “Eksik olanların tümünü yükle” seçeneğini kullanın veya öğeleri ayrı ayrı düzeltin.
; report_dialog
report_bug=Hata bildir
report_crash_title=Son oturumda bir çökme meydana geldi
report_crash_sub="ASM beklenmeyen bir hatayla karşılaştı. Bir hata bildirimi oluşturmak için “GitHub sorunu aç” seçeneğine tıklayın - kısa bir özet tarayıcınızda açılır ve tam tanılama dosyası yerel olarak kaydedilir; bu dosyayı sorun oluşturma ekranına sürükleyip bırakabilirsiniz."
report_bug_sub=Bir hata bildirimi oluşturmaya başlamak için “GitHub sorunu aç” seçeneğine tıklayın. Kısa bir özet tarayıcınızda açılır ; a full diagnostic file (USB tree, udev rules, PA/PW sinks, journalctl, etc.) is saved locally — drag-and-drop it into the GitHub editor as an attachment.
report_desc_hint=Ne olduğunu açıklayın (yeniden üretme adımları, beklenen ve gerçekleşen sonuçlar):
report_desc_placeholder=Örnek: "Sonar sekmesine tıkladım, Bass Boost ön ayarına geçtim ve ASM’yi yeniden başlatana kadar Game kanalı sessiz kaldı." (İsteğe bağlıdır ama çok yardımcı olur - ek bağlamınız yoksa boş bırakın.)
report_preview_hint=Gönderilecek tam tanılama raporunun ön izlemesi:
copy_full_report=Tam raporu kopyala
open_folder=Klasörü aç
submit_auto_gh=Otomatik olarak gönder (gh CLI) ↗
open_github_issue=GitHub sorunu aç ↗
open_manually=Manuel olarak aç ↗
uploading=Yükleniyor…
issue_filed=Sorun bildirildi ✓
issue_opened=Issue açıldı ↗ — dosyayı buraya bırakın
crash_report_title=Çökme raporu
bug_report_title=Hata raporu
; telemetry_dialog
telemetry_title=ASM’yi geliştirmeye yardımcı olun
telemetry_body=Arctis Sound Manager’ı geliştirmeye yardımcı olmak için anonim kullanım verilerini paylaşmak ister misiniz?<br><br>Aşağıdaki bilgiler <b>günde bir kez</b> gönderilecektir:<br>&nbsp ;&nbsp;• Your Linux distribution (e.g. Arch Linux, Ubuntu 24.04)<br>&nbsp;&nbsp;• Your headset model (e.g. Arctis Nova Pro Wired)<br>&nbsp;&nbsp;• The ASM version you are running<br><br><b>No personal data</b>, no IP address, no unique identifier.
telemetry_note=Bunu istediğiniz zaman <b>Ayarlar → Telemetri</b> bölümünden değiştirebilirsiniz.
no_thanks=Hayır, teşekkürler
yes_share=Evet, anonim olarak paylaş
; install_dialogs
multi_install_title=Arctis Sound Manager’ın birden fazla kurulumu bulundu
multi_install_body="Şimdi güncelleme yapmak, bunlardan birinin üzerine kurulum yapacak ve diğerlerini kaldırmayacaktır; bu da “cihaz algılanamadı” hatasına, arka planda yanlış sürüm daemon’ların çalışmasına ve eski, güncellenmemiş ses yönlendirmesine neden olur."
detected_install_methods=Algılanan kurulum yöntemleri:
multi_install_fix_intro=Temiz yeniden kurulum betiğini çalıştırarak tüm kopyaları kaldırın ve tercih ettiğiniz yöntemle yeni bir sürüm kurun:

