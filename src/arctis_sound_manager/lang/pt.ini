crash_report_title=Relatório de falhas
bug_report_title=Relatório de bug
; telemetry_dialog
telemetry_title=Ajude a melhorar o ASM
telemetry_body=Gostaria de compartilhar dados anônimos de uso para ajudar a melhorar o Arctis Sound Manager?<br><br>A seguinte informação seria enviada <b>uma vez por dia</b>:<br> ;&nbsp;• Your Linux distribution (e.g. Arch Linux, Ubuntu 24.04)<br>&nbsp;&nbsp;• Your headset model (e.g. Arctis Nova Pro Wired)<br>&nbsp;&nbsp;• The ASM version you are running<br><br><b>No personal data</b>, no IP address, no unique identifier.
telemetry_note=Você pode mudar isso a qualquer momento em <b>Configurações → Telemetria</b>.
no_thanks=Não, obrigado
yes_share=Sim, compartilhar anonimamente
; install_dialogs
multi_install_title=Foram encontradas várias instalações do Arctis Sound Manager
multi_install_body=Atualizar agora instalaria em cima de um deles sem remover os outros, que é a causa de "nenhum dispositivo detectado", daemons de versão errada executando em segundo plano e roteamento de áudio obsoleto.
detected_install_methods=Métodos de instalação detectados:
multi_install_fix_intro=Execute o script de reinstalação limpa para remover todas as cópias e instalar uma nova versão através do seu método preferido:

