; first_run_dialog
first_run_welcome=Bem-vindo ao Arctis Sound Manager
first_run_desc=Uma configuração única é necessária para configurar conexões virtuais do PipeWire, instalar regras de acesso ao dispositivo, baixar a resposta de impulso virtual-espacial e ativar os serviços de sistema. Você será solicitado que sua senha de administrador instale as regras udev.
run_setup=Executar configuração
; filter-chain safe-mode banner (issue #88)
; udev_dialog
udev_write_title=Permissões do dispositivo USB não configuradas
udev_write_body=As regras udev necessárias para acessar o seu headset Arctis está com privilégios de root faltando ou incompletos. Sem eles, o daemon não pode abrir o dispositivo USB (Erro 13: Acesso negado). Clique em "Instalar regras" para corrigir isso automaticamente (requer senha de administrador).
udev_write_btn=Instalar regras
udev_reload_title=Permissões do dispositivo USB não aplicadas
udev_reload_body=As regras udev estão instaladas, mas o dispositivo Arctis atualmente anexado foi conectado antes que elas entrassem em vigor. O daemon não pode abrir o dispositivo USB (Erro 13: Acesso negado). Clique em "Aplicar agora" para recarregar as regras e ativá-las no dispositivo atual (requer senha de administrador). Como alternativa, você pode simplesmente desconectar e reconectar o dongle.
udev_reload_btn=Aplique agora!
; system_deps_dialog
sysdeps_header=Alguns componentes necessários estão faltando
sysdeps_sub=Funcionalidades do ASM que dependem de pacotes faltantes no sistema não funcionarão até que estejam instalados. A distribuição detectada é {distro} - instale comandos abaixo que correspondam ao gerenciador de pacotes. Cada instalação solicitará sua senha de administrador (via polkit).
dep_breaks=Quebras: {feature}
dep_note=Nota: {note}
skip_until_upgrade=Não mostrar novamente até que o ASM seja atualizado
all_checks_pass=Todas as verificações bloqueadas agora passam — você pode fechar este diálogo.
; {count} = number of issues. Both forms must be translated on Crowdin.
issue_count_one=Problema {count} detectado. Use 'Instalar tudo que falta' para um único prompt polkit, ou corrija os itens individualmente.
issue_count_other=Problema {count} detectado. Use 'Instalar tudo que falta' para um único prompt polkit, ou corrija os itens individualmente.
; report_dialog
report_bug=Relatar um bug
report_crash_title=Ocorreu um erro na última sessão
report_crash_sub=O ASM encontrou um erro inesperado. Clique em "Abrir issue no GitHub" para registrar um relatório — um breve resumo abrirá no seu navegador, e um arquivo de diagnóstico completo é salvo localmente para você poder.
report_bug_sub=Clique em "Abrir issue no GitHub" para apresentar um relatório. Um breve resumo abrirá no seu navegador ; a full diagnostic file (USB tree, udev rules, PA/PW sinks, journalctl, etc.) is saved locally — drag-and-drop it into the GitHub editor as an attachment.
report_desc_hint=Descreva o que aconteceu (passos para reproduzir, esperado vs ocorrido):
report_desc_placeholder=Exemplo: "Eu cliquei na aba Sonar, mudou para a predefinição do Salto de Graves e o canal de jogo ficou silencioso até eu reiniciar o ASM. (Opcional mas muito útil — deixe em branco se você não tiver contexto adicional.)
report_preview_hint=Pré-visualização do diagnóstico completo que será enviado:
copy_full_report=Copiar relatório completo
open_folder=Abrir pasta
submit_auto_gh=Enviar automaticamente (gh CLI) ↗️
