; first_run_dialog
first_run_welcome=Willkommen bei Arctis Sound Manager
first_run_desc=Ein einmaliges Setup ist erforderlich, um PipeWire Virtual Sinks zu konfigurieren, Gerätezugriffsregeln zu installieren, die Virtual-Surround Impulsantwort herunterzuladen und die System-Dienste zu aktivieren. Sie werden nach Ihrem Administrator Passwort gefragt, um die udev-Regeln zu installieren.
run_setup=Setup ausführen
; filter-chain safe-mode banner (issue #88)
; udev_dialog
udev_write_title=USB Geräteberechtigungen nicht konfiguriert
udev_write_body=Die udev-Regeln, die benötigt werden, um auf dein Arctis Kopfhörer ohne Root-Rechte zuzugreifen, fehlen oder sind unvollständig. Ohne sie kann der Daemon das USB-Gerät nicht öffnen (Fehler 13: Zugriff verweigert). Klicken Sie auf "Regeln installieren", um dies automatisch zu beheben (erfordert Administrator Passwort).
udev_write_btn=Regeln installieren
udev_reload_title=USB Geräteberechtigungen nicht angewendet
udev_reload_body=Die udev-Regeln sind installiert, aber das aktuell angeschlossene Arctis-Gerät wurde eingesteckt, bevor sie in Kraft traten. Der Daemon kann das USB-Gerät nicht öffnen (Fehler 13: Zugriff verweigert). Klicken Sie auf "Jetzt anwenden", um die Regeln neu zu laden und sie auf dem aktuellen Gerät auszulösen (erfordert Administrator Passwort). Alternativ können Sie den Dongle einfach entfernen und erneut einstecken.
udev_reload_btn=Jetzt anwenden
; system_deps_dialog
sysdeps_header=Einige benötigte Komponenten fehlen
sysdeps_sub=ASM-Funktionen, die von fehlenden Systempaketen abhängen, funktionieren erst dann, wenn sie installiert sind. Die entdeckte Distribution ist {distro} — Installationsbefehle unten stimmen mit dem Paketmanager überein. Jede Installation wird nach Ihrem Administrator Passwort fragen (via polkit).
dep_breaks=Breaks: {feature}
dep_note=Notiz: {note}
skip_until_upgrade=Nicht mehr anzeigen bis ASM aktualisiert wird
all_checks_pass=Alle blockierenden und fehlerhaften Prüfungen wurden nun erfolgreich abgeschlossen – dieser Dialog kann geschlossen werden.
; {count} = number of issues. Both forms must be translated on Crowdin.
issue_count_one={count} Problem erkannt. Benutzen Sie 'Alle Fehlenden installieren' für eine einzelne Eingabeaufforderung oder reparieren Sie einzelne Elemente.
issue_count_other={count} Probleme erkannt. Benutzen Sie 'Alle Fehlenden installieren' für eine einzelne Eingabeaufforderung oder reparieren Sie einzelne Elemente.
; report_dialog
report_bug=Fehler melden
report_crash_title=Ein Absturz ist in der letzten Sitzung aufgetreten
report_crash_sub=In ASM ist ein unerwarteter Fehler aufgetreten. Klicke "GitHub öffnen", um einen Bericht zu erstellen — eine kurze Zusammenfassung öffnet sich in Ihrem Browser, und eine vollständige Diagnosedatei wird lokal gespeichert, die Sie in das Problembearbeitungsprogramm ziehen können.
report_bug_sub=Klicke "GitHub öffnen", um einen Bericht einzureichen. Eine kurze Zusammenfassung öffnet sich in Ihrem Browser ; a full diagnostic file (USB tree, udev rules, PA/PW sinks, journalctl, etc.) is saved locally — drag-and-drop it into the GitHub editor as an attachment.
report_desc_hint="Beschreibe was passiert ist (Schritte zum Reproduzieren; erwartetes vs. tatsächliches Ergebnis):"
report_desc_placeholder=Beispiel: "Ich habe auf den Sonar Tab geklickt, auf die Bass Boost Voreinstellung gewechselt und der Game Channel wurde stumm, bis ich ASM neu gestartet habe." (Optional, aber sehr hilfreich — leer lassen, wenn es keinen zusätzlichen Kontext gibt.)
report_preview_hint=Vorschau der vollständigen Diagnose, die eingereicht wird:
copy_full_report=Vollständigen Bericht kopieren
open_folder=Ordner öffnen
submit_auto_gh=Automatisch senden (gh CLI) ↗
open_github_issue=Öffne GitHub Issue ↗
open_manually=Manuell öffnen ↗
uploading=Wird hochgeladen…
issue_filed=Issue eingereicht ✓
issue_opened=Issue geöffnet ↗ — Drop die Datei
crash_report_title=Absturzbericht
bug_report_title=Fehlerbericht
; telemetry_dialog
telemetry_title=Hilf mit, ASM zu verbessern
telemetry_body=Möchten Sie anonyme Nutzungsdaten teilen, um den Arctis Sound Manager zu verbessern?<br><br>Die folgenden Informationen würden <b>einmal pro Tag</b> gesendet werden:<br>&nbsp ;&nbsp;• Your Linux distribution (e.g. Arch Linux, Ubuntu 24.04)<br>&nbsp;&nbsp;• Your headset model (e.g. Arctis Nova Pro Wired)<br>&nbsp;&nbsp;• The ASM version you are running<br><br><b>No personal data</b>, no IP address, no unique identifier.
telemetry_note=Sie können dies jederzeit ändern: <b>Einstellungen → Telemetrie</b>
no_thanks=Nein, danke
yes_share=Ja, anonym teilen
