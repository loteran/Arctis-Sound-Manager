multi_install_title=Mehrere Installationen von Arctis Sound Manager wurden gefunden
multi_install_body=Ein Update würde derzeit über eine dieser Installationen hinweg erfolgen, ohne die anderen zu entfernen. Dies könnte dazu führen, dass kein Gerät erkannt wird, Daemons mit falscher Version im Hintergrund laufen und das Audio-Routing veraltet ist.
