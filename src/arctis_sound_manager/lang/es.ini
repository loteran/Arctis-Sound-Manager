; first_run_dialog
first_run_welcome=Abrir Arctis Sound Manager
first_run_desc=Se requiere una configuración única para configurar los sumideros virtuales de PipeWire, instalar reglas de acceso al dispositivo, descargar la respuesta de impulso de entorno virtual y habilitar los servicios del sistema. Se le pedirá a su contraseña de administrador que instale las reglas de udev.
run_setup=Ejecutar configuración
; udev_dialog
udev_write_title=Permisos de dispositivo USB no configurados
udev_write_body=Las reglas udev requeridas para acceder a tu auricular Arctis sin privilegios de root faltan o están incompletas. Sin ellos, el daemon no puede abrir el dispositivo USB (Error 13: Acceso denegado). Haga clic en "Instalar reglas" para arreglar esto automáticamente (requiere contraseña de administrador).
udev_write_btn=Instalar reglas
udev_reload_title=Permisos de dispositivo USB no aplicados
udev_reload_body=Las reglas udev están instaladas pero el dispositivo Arctis actualmente conectado fue enchufado antes de que entraran en vigor. El daemon no puede abrir el dispositivo USB (Error 13: Acceso denegado). Haga clic en "Aplicar ahora" para recargar las reglas y activarlas en el dispositivo actual (requiere contraseña del administrador). Alternativamente, puede simplemente desconectar y volver a conectar el dongle.
udev_reload_btn=Aplicar ahora
; system_deps_dialog
sysdeps_header=Faltan algunos componentes necesarios
sysdeps_sub=Las características de ASM que dependen de los paquetes del sistema que faltan no funcionarán hasta que estén instalados. La distribución detectada es {distro}: instale los comandos a continuación coinciden con ese gestor de paquetes. Cada instalación solicitará su contraseña de administrador (a través de polkit).
dep_breaks=Rompas: {feature}
dep_note=Nota: {note}
skip_until_upgrade=No mostrar de nuevo hasta que ASM se actualice
all_checks_pass=Ahora pasan todas las comprobaciones de bloqueo y degradación — puede cerrar este diálogo.
; {count} = number of issues. Both forms must be translated on Crowdin.
issue_count_one=Se detectó un problema {count} . Utilice 'Instalar todo lo que falta' para una petición de un solo paquete o arregle elementos individualmente.
issue_count_other=Se detectaron problemas {count}. Utilice 'Instalar todo lo que falta' para una petición de un solo paquete de sondeo, o arregle elementos individualmente.
; report_dialog
report_bug=Reportar error
report_crash_title=Se ha producido un error en la última sesión
report_crash_sub=ASM encontró un error inesperado. Haga clic en "Abrir GitHub issue" para presentar un reporte — se abre un breve resumen en su navegador, y un archivo de diagnóstico completo se guarda localmente que puede arrastrar y soltar en el editor de incidencias.
report_bug_sub=Haga clic en "Abrir GitHub issue" para empezar a presentar un informe. Se abre un breve resumen en su navegador ; a full diagnostic file (USB tree, udev rules, PA/PW sinks, journalctl, etc.) is saved locally — drag-and-drop it into the GitHub editor as an attachment.
report_desc_hint=Describe lo que sucedió (pasos para reproducir, esperados vs actual):
report_desc_placeholder=Ejemplo: "Hice clic en la pestaña de Sonar, cambié a la configuración predeterminada de Bass Boost y el canal de juego permaneció en silencio hasta que reinicié ASM. (Opcional, pero muy útil, déjalo en blanco si no tienes ningún contexto extra.)
report_preview_hint=Vista previa del diagnóstico completo que se enviará:
copy_full_report=Copiar el informe completo
open_folder=Abrir directorio
submit_auto_gh=Enviar automáticamente (gh CLI) ↗️
open_github_issue=Abrir GitHub issue ↗️
open_manually=Abrir manualmente ↗️
uploading=Subiendo…
issue_filed=Petición archivada ✓
issue_opened=Problema abierto ↗️ — suelte el archivo en
crash_report_title=Informe de error
bug_report_title=Informe de error
; telemetry_dialog
telemetry_title=Ayuda a mejorar ASM
telemetry_body=¿Desea compartir datos de uso anónimos para ayudar a mejorar Arctis Sound Manager?<br><br>La siguiente información se enviaría <b>una vez al día</b>:<br>  ;&nbsp;• Your Linux distribution (e.g. Arch Linux, Ubuntu 24.04)<br>&nbsp;&nbsp;• Your headset model (e.g. Arctis Nova Pro Wired)<br>&nbsp;&nbsp;• The ASM version you are running<br><br><b>No personal data</b>, no IP address, no unique identifier.
telemetry_note=Puede cambiar esto en cualquier momento en <b>Ajustes → Telemetería</b>.
no_thanks=No gracias
yes_share=Sí, compartir anónimamente
; install_dialogs
multi_install_title=Se han encontrado múltiples instalaciones de Arctis Sound Manager
multi_install_body=La actualización ahora se instalaría encima de uno de estos sin eliminar los otros, que es la causa de "ningún dispositivo detectado", daemons de versión incorrecta corriendo en segundo plano y rutado de audio obsoleto.
detected_install_methods=Métodos de instalación detectados:
multi_install_fix_intro=Ejecute el script de reinstalación de limpieza para eliminar cada copia e instalar una versión nueva a través de su método preferido:

