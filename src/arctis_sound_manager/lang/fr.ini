; first_run_dialog
first_run_welcome=Bienvenue dans {app_name}
first_run_desc=Une configuration à usage unique est nécessaire pour configurer les sinks virtuels de PipeWire, installer les règles d'accès au périphérique, télécharger la réponse d'impulsion virtuelle et activer les services système. Il vous sera demandé votre mot de passe administrateur pour installer les règles udev.
run_setup=Lancer la configuration
; udev_dialog
udev_write_title=Permissions du périphérique USB non configurées
udev_write_body=Les règles udev requises pour accéder à votre casque Arctis sans privilèges root sont manquantes ou incomplètes. Sans eux, le démon ne peut pas ouvrir le périphérique USB (Erreur 13 : Accès refusé). Cliquez sur "Installer les règles" pour résoudre ce problème automatiquement (nécessite un mot de passe d'administrateur).
udev_write_btn=Installer les règles
udev_reload_title=Autorisations du périphérique USB non appliquées
udev_reload_body=Les règles udev sont installées, mais le dispositif Arctis actuellement connecté a été branché avant de prendre effet. Le démon ne peut pas ouvrir le périphérique USB (Erreur 13 : Accès refusé). Cliquez sur "Appliquer maintenant" pour recharger les règles et les déclencher sur l'appareil actuel (nécessite un mot de passe d'administrateur). Vous pouvez aussi simplement débrancher et rebrancher le dongle.
udev_reload_btn=Appliquer maintenant
; system_deps_dialog
sysdeps_header=Des composants requis sont manquants
sysdeps_sub=Les fonctionnalités ASM qui dépendent des paquets système manquants ne fonctionneront pas tant qu'elles ne seront pas installées. La distribution détectée est {distro} — les commandes d'installation ci-dessous correspondent à ce gestionnaire de paquets. Chaque installation vous demandera votre mot de passe administrateur (via polkit).
dep_breaks=Pauses : {feature}
dep_note=Remarque : {note}
skip_until_upgrade=Ne plus afficher jusqu'à ce que l'ASM soit mis à jour
all_checks_pass=Toutes les vérifications de blocage et dégradées passent maintenant — vous pouvez fermer cette fenêtre.
; {count} = number of issues. Both forms must be translated on Crowdin.
issue_count_one=Problème {count} détecté. Utilisez 'Installer tout manque' pour une seule invite de polkit, ou corrigez des éléments individuellement.
issue_count_other=Problèmes {count} détectés. Utilisez « Installer tout manquant » pour une seule invite de polkit, ou corrigez des éléments individuellement.
; report_dialog
report_bug=Signaler un bug
report_crash_title=Un plantage s'est produit lors de la dernière session
report_crash_sub=ASM a rencontré une erreur inattendue Cliquez sur "Ouvrir un problème GitHub" pour déposer un rapport — un court résumé s'ouvre dans votre navigateur, et un fichier de diagnostic complet est enregistré localement que vous pouvez glisser-déposer dans l'éditeur de tickets.
report_bug_sub=Cliquez sur "Ouvrir un problème GitHub" pour commencer à remplir un rapport. Un bref résumé s'ouvre dans votre navigateur ; a full diagnostic file (USB tree, udev rules, PA/PW sinks, journalctl, etc.) is saved locally — drag-and-drop it into the GitHub editor as an attachment.
report_desc_hint=Décrivez ce qui s'est passé (étapes à reproduire, attendues vs réelles) :
report_desc_placeholder=Exemple : "J'ai cliqué sur l'onglet Sonar, basculé vers le préréglage Bass Boost et le canal de jeu est resté silencieux jusqu'à ce que je redémarre ASM. (Optionnel mais très utile — laissez vide si vous n'avez pas de contexte supplémentaire.)
report_preview_hint=Aperçu du diagnostic complet qui sera envoyé :
copy_full_report=Copier le rapport complet
open_folder=Ouvrir un dossier
submit_auto_gh=Envoyer automatiquement (gh CLI) ↗️
open_github_issue=Ouvrir le ticket GitHub ↗️
open_manually=Ouvrir manuellement ↗️
uploading=Envoi en cours…
issue_filed=Ticket rempli ✓
issue_opened=Ticket ouvert ↗️ — dépose le fichier dans
crash_report_title=Rapport d'erreur
bug_report_title=Rapport de bug
; telemetry_dialog
telemetry_title=Aider à améliorer ASM
telemetry_body=Voulez-vous partager des données d'utilisation anonymes pour améliorer {app_name}?<br><br>Les informations suivantes seront envoyées <b>une fois par jour</b>:<br>&nbsp ;&nbsp;• Your Linux distribution (e.g. Arch Linux, Ubuntu 24.04)<br>&nbsp;&nbsp;• Your headset model (e.g. Arctis Nova Pro Wired)<br>&nbsp;&nbsp;• The ASM version you are running<br><br><b>No personal data</b>, no IP address, no unique identifier.
telemetry_note=Vous pouvez modifier cela à tout moment dans <b>Paramètres → Télémétrie</b>.
no_thanks=Non merci
yes_share=Oui, partager anonymement
; install_dialogs
multi_install_title=Plusieurs installations d' {app_name} ont été trouvées
multi_install_body=Mettre à jour maintenant, installerait par-dessus sans supprimer les autres, qui est la cause de "aucun périphérique détecté", des démons de version incorrecte exécutant en arrière-plan et un routage audio obsolète.
detected_install_methods=Méthodes d'installation détectées :
multi_install_fix_intro=Exécutez le script clean-reinstall pour supprimer chaque copie et installer une nouvelle version via votre méthode préférée :

