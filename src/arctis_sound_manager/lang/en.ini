telemetry_body = Would you like to share anonymous usage data to help improve Arctis Sound Manager?<br><br>The following information would be sent <b>once per day</b>:<br>&nbsp;&nbsp;• Your Linux distribution (e.g. Arch Linux, Ubuntu 24.04)<br>&nbsp;&nbsp;• Your headset model (e.g. Arctis Nova Pro Wired)<br>&nbsp;&nbsp;• The ASM version you are running<br><br><b>No personal data</b>, no IP address, no unique identifier.
telemetry_note = You can change this at any time in <b>Settings → Telemetry</b>.
