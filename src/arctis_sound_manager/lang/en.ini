; first_run_dialog
first_run_welcome = Welcome to Arctis Sound Manager
first_run_desc = A one-time setup is required to configure PipeWire virtual sinks, install device-access rules, download the virtual-surround impulse response and enable the systemd services. You will be prompted for your administrator password to install the udev rules.
run_setup = Run setup
; filter-chain safe-mode banner (issue #88)
safe_mode_banner = Safe mode is on: the EQ was disabled after the audio filter-chain crashed. If the problem is gone (e.g. after an update), re-enable it.
safe_mode_reset_btn = Re-enable EQ
safe_mode_reset_btn_working = Re-enabling…
; udev_dialog
udev_write_title = USB device permissions not configured
udev_write_body = The udev rules required to access your Arctis headset without root privileges are missing or incomplete. Without them, the daemon cannot open the USB device (Error 13: Access denied). Click "Install rules" to fix this automatically (requires administrator password).
udev_write_btn = Install rules
udev_reload_title = USB device permissions not applied
udev_reload_body = The udev rules are installed but the currently-attached Arctis device was plugged in before they took effect. The daemon cannot open the USB device (Error 13: Access denied). Click "Apply now" to reload the rules and trigger them on the current device (requires administrator password). Alternatively, you can simply unplug and replug the dongle.
udev_reload_btn = Apply now
; system_deps_dialog
sysdeps_header = Some required components are missing
sysdeps_sub = ASM features that depend on missing system packages will not work until they are installed. The detected distribution is {distro} — install commands below match that package manager. Each install will prompt for your administrator password (via polkit).
dep_breaks = Breaks: {feature}
dep_note = Note: {note}
skip_until_upgrade = Don't show again until ASM is upgraded
all_checks_pass = All blocking and degraded checks now pass — you can close this dialog.
; {count} = number of issues. Both forms must be translated on Crowdin.
issue_count_one = {count} issue detected. Use 'Install all missing' for a single polkit prompt, or fix items individually.
issue_count_other = {count} issues detected. Use 'Install all missing' for a single polkit prompt, or fix items individually.
; report_dialog
report_bug = Report a bug
report_crash_title = A crash occurred in the last session
report_crash_sub = ASM encountered an unexpected error. Click "Open GitHub issue" to file a report — a short summary opens in your browser, and a full diagnostic file is saved locally that you can drag-and-drop into the issue editor.
report_bug_sub = Click "Open GitHub issue" to start filing a report. A short summary opens in your browser; a full diagnostic file (USB tree, udev rules, PA/PW sinks, journalctl, etc.) is saved locally — drag-and-drop it into the GitHub editor as an attachment.
report_desc_hint = Describe what happened (steps to reproduce, expected vs actual):
report_desc_placeholder = Example: "I clicked the Sonar tab, switched to the Bass Boost preset and the Game channel went silent until I restarted ASM." (Optional but very helpful — leave blank if you have no extra context.)
