device:
  name: SteelSeries Arctis 7+
  vendor_id: 0x1038
  product_ids:
    - 0x220e # Arctis 7+
    - 0x2212 # Arctis 7+ PS5
    - 0x2216 # Arctis 7+ Xbox
    - 0x2236 # Arctis 7+ Destiny
    - 0x227a # Nova 7 WOW Edition
  command_padding:
    length: 64
    position: end
    filler: 0x00

  command_transport: ctrl_output  # HID SET_REPORT, interface 3 (usagepage 0xffc0)
  command_interface_index: [3, 0]
  listen_interface_indexes: [3]
  dial_interface_index: 3         # expected dial interface (same as status on most variants)
  dial_interface_candidates: [5]  # Nova 7 WOW Edition uses interface 5 (bInterfaceNumber)

  device_init:
    - [0x10]
    - ['status.request']
    - [0xa3, 'settings.pm_shutdown']
    - [0xae, 'settings.mic_mute_led_brightness']
    - [0x37, 'settings.mic_volume']
    - [0x39, 'settings.mic_side_tone']
    - [0x09]
    - ['status.request']
    - [0x09]

  status:
    request: 0xb0
    response_mapping:
      - starts_with: 0x45
        media_mix: 0x01
        chat_mix: 0x02

      - starts_with: 0xb0
        headset_power_status: 0x01
        headset_battery_charge: 0x02
        cable_charging: 0x03
        media_mix: 0x04
        chat_mix: 0x05

    representation:
      headset:
        - headset_power_status
        - headset_battery_charge
        - cable_charging
        - chat_mix
        - media_mix
      mic:
        - mic_status

  online_status:
    status_variable: headset_power_status
    online_value: online

  audio:
    spatial_engine: hesuvi

  settings:
    microphone:
      mic_volume:
        type: slider
        min: 0x00
        max: 0x07
        step: 1
        min_label: mic_muted
        max_label: perc_100
        default: 0x07
        update_sequence: [0x37, 'value']
      mic_side_tone:
        type: button_group
        values_mapping:
          0x00: off
          0x01: low
          0x02: medium
          0x03: high
        default: 0x00
        update_sequence: [0x39, 'value']
      mic_mute_led_brightness:
        type: button_group
        values_mapping:
          0x00: off
          0x01: low
          0x02: medium
          0x03: high
        default: 0x03
        update_sequence: [0xae, 'value']
    power_management:
      pm_shutdown:
        type: button_group
        values_mapping:
          0x00: never
          0x01: 1_minute
          0x05: 5_minutes
          0x0a: 10_minutes
          0x0f: 15_minutes
          0x1e: 30_minutes
          0x2d: 45_minutes
          0x3c: 60_minutes
          0x4b: 75_minutes
          0x5a: 90_minutes
        default: 0x1e
        update_sequence: [0xa3, 'value']

  status_parse:
    # Arctis 7+ offline flag: data[1]=0x01 means offline (different from Nova 7's 0x02)
    headset_power_status:
      type: on_off
      off: 0x01
      on: 0x02
    headset_battery_charge:
      type: percentage
      perc_min: 0
      perc_max: 4
    cable_charging:
      type: on_off
      off: 0x00
      on: 0x01
    media_mix:
      type: percentage
      perc_min: 0
      perc_max: 100
    chat_mix:
      type: percentage
      perc_min: 0
      perc_max: 100
    mic_status:
      type: int_str_mapping
      values:
        0x01: muted
        0x00: unmuted
